# ==============================
# הגדרות אפליקציה
# ==============================

# פורט השרת
server.port=8080

# ==============================
# הגדרות בסיס נתונים (H2 - רץ בזיכרון, מתאים לפיתוח)
# בפרודקשן: מחליפים לפוסטגרס/MySQL
# ==============================
spring.datasource.url=jdbc:h2:mem:restaurantdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# יוצר את הטבלאות אוטומטית מהמודל
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ממשק ניהול H2 (רק לפיתוח!) - נכנסים ל http://localhost:8080/h2-console
spring.h2.console.enabled=true
