# .github/workflows/ci.yml
# Pipeline של GitHub Actions
# מה זה עושה:
#   1. בכל push ל-main -> בונה ובודק את הקוד
#   2. בונה Docker images
#   3. (עתידי) דוחף ל-AWS

name: CI/CD Pipeline - Restaurant System

# מתי ה-pipeline רץ?
on:
  push:
    branches: [ main ]        # בכל push ל-main
  pull_request:
    branches: [ main ]        # בכל PR לכיוון main

jobs:

  # ==============================
  # שלב 1: בדיקות (Tests)
  # ==============================
  test:
    name: Run Tests
    runs-on: ubuntu-latest    # GitHub מריץ את זה על VM עם Ubuntu

    steps:
      # מוריד את הקוד מה-repo
      - name: Checkout code
        uses: actions/checkout@v4

      # מתקין Java 17
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # שומר cache של ספריות Maven (מאיץ builds עתידיים)
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('backend/pom.xml') }}

      # מריץ את הבדיקות
      - name: Run tests
        working-directory: backend
        run: mvn test

  # ==============================
  # שלב 2: Build Docker Images
  # ==============================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test               # רץ רק אם שלב ה-test עבר בהצלחה

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # בונה את image של ה-backend
      - name: Build backend Docker image
        run: docker build -t restaurant-backend:${{ github.sha }} ./backend

      # בונה את image של ה-frontend
      - name: Build frontend Docker image
        run: docker build -t restaurant-frontend:${{ github.sha }} ./frontend

      # מוודא שהמערכת עולה תקין עם docker-compose
      - name: Smoke test with docker-compose
        run: |
          docker compose up -d
          sleep 15
          curl --fail http://localhost:8080/api/orders || exit 1
          echo "✅ Backend is up and responding!"
          docker compose down

  # ==============================
  # שלב 3: Push to Docker Hub (רק ב-main)
  # ==============================
  # בעתיד תוסיף כאן deploy ל-AWS:
  # - AWS ECR (במקום Docker Hub)
  # - ECS / EC2 להרצה
  push-to-registry:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'  # רק ב-main, לא ב-PR

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # מתחבר ל-Docker Hub (הסיסמא שמורה ב-GitHub Secrets)
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-backend:${{ github.sha }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-frontend:${{ github.sha }}
