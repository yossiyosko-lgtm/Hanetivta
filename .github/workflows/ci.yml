# .github/workflows/ci.yml
# Pipeline של GitHub Actions
# מה זה עושה:
#   1. בכל push ל-main -> בונה ובודק את הקוד
#   2. בונה Docker images
#   3. (עתידי) דוחף ל-AWS

name: CI
on:
  push:
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          chache: maven
      - name: build and test
        run: mvn -B verify
      - name: fun
        run: espeak "check completed" 

          

